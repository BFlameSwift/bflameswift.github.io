{% include base_path %}
<div class="masthead">
  <div class="masthead__inner-wrap">
    <div class="masthead__menu">
      <nav id="site-nav" class="greedy-nav">
        <button><span class="navicon"></span></button>
        <ul class="visible-links">
          <li class="masthead__menu-item masthead__menu-item--lg persist">
            <a href="{{ base_path }}/">{{ site.title }}</a>
          </li>
          {% for link in site.data.navigation.main %}
            {% if link.url contains 'http' %}
              {% assign domain = '' %}
            {% else %}
              {% assign domain = base_path %}
            {% endif %}
            <li class="masthead__menu-item">
              <a
                href="{{ domain }}{{ link.url }}"
                data-anchor-target="{{ link.url | split: '#' | last }}"
              >{{ link.title }}</a>
            </li>
          {% endfor %}
          <li id="theme-toggle" class="masthead__menu-item persist tail">
            <a role="button" aria-labelledby="theme-icon"><i id="theme-icon" class="fa-solid fa-sun" aria-hidden="true" title="toggle theme"></i></a>
          </li>
        </ul>
        <ul class="hidden-links hidden"></ul>
      </nav>
    </div>
  </div>
</div>
<script>
  (function () {
    var nav = document.getElementById('site-nav');
    if (!nav) {
      return;
    }

    var links = nav.querySelectorAll('a[data-anchor-target]');
    var homeItem = nav.querySelector('li.masthead__menu-item--lg');

    function setActive() {
      if (homeItem) {
        homeItem.classList.remove('selected');
      }
      var current = (window.location.hash || '#about').replace('#', '');
      links.forEach(function (link) {
        var item = link.parentElement;
        if (!item) {
          return;
        }
        var target = link.getAttribute('data-anchor-target');
        item.classList.toggle('selected', target === current);
      });
    }

    setActive();
    window.addEventListener('hashchange', setActive, false);
  })();
</script>
